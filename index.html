<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background-color: #f5f7fa;
            padding: 30px 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: bold;
            line-height: 1.4;
        }
        .form-item {
            margin-bottom: 20px;
        }
        .form-item label {
            display: block;
            font-size: 15px;
            color: #34495e;
            margin-bottom: 8px;
        }
        .input-box {
            width: 100%;
            padding: 12px 15px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
        }
        .input-box:focus {
            border-color: #3498db;
            box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
        }
        .captcha-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .captcha-code {
            width: 120px;
            height: 42px;
            background: #eef5ff;
            border: 1px solid #cce0ff;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 2px;
            cursor: pointer;
            user-select: none;
        }
        .query-btn {
            width: 100%;
            padding: 14px;
            background: #3498db;
            color: white;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .query-btn:hover {
            background: #2980b9;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: none;
        }
        .result-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #e74c3c;
            text-align: center;
        }
        .result-content {
            font-size: 16px;
            color: #2c3e50;
            line-height: 1.6;
            text-align: center;
        }
        .no-result {
            color: #95a5a6;
        }
    </style>
</head>
<body>
    <div class="title">“易”启新程，跃动青春 活动获奖情况查询</div>

    <div class="form-item">
        <label>请输入你的姓名</label>
        <input type="text" class="input-box" id="userName" placeholder="请输入真实姓名">
    </div>

    <div class="form-item">
        <label>请输入验证码</label>
        <div class="captcha-row">
            <input type="text" class="input-box" id="captchaInput" placeholder="输入右侧验证码">
            <div class="captcha-code" id="captchaCode" onclick="refreshCaptcha()"></div>
        </div>
    </div>

    <button class="query-btn" onclick="queryPrize()">点击查询获奖情况</button>

    <div class="result-box" id="resultBox">
        <div class="result-title" id="resultTitle"></div>
        <div class="result-content" id="resultContent"></div>
    </div>

    <script>
        // 获奖数据
        const prizeData = {
            "一等奖": ["杨海凌", "吴春晨", "吴佳翱", "夏思莹", "马小倩", "王珂珂", "李昕", "杨靖一", "唐韵知", "钟欣"],
            "二等奖": ["相梦", "侯锦涵", "刘子梦", "杨丽萍", "李琼", "黄艳清", "谢俊霞", "陈屿域", "蒋佩璇", "刘加兴", "陈月", "童瑶"],
            "三等奖": ["滕妍", "赵岩", "石婉聪", "胡天睿", "刘欣宇"],
            "参与奖": ["翁欣怡", "尚相妩", "孔维唱", "邹涵睿", "刘韵", "李雨昕", "杨芷凌", "胡天睿", "杜昕睿", "谢释庆", "冯睿锴", "庹家豪", "李曦文", "陈静", "刘惜雨", "胡海霞", "张淼", "何淑文", "陈智佩", "易友89347650", "易友99426614", "曼淇2025070401", "易友67027845", "小浣熊干脆面"]
        };

        let currentCaptcha = "";

        // 页面加载 → 生成验证码
        window.onload = function () {
            refreshCaptcha();
        };

        // 生成随机验证码（字母+数字）
        function refreshCaptcha() {
            const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let code = "";
            for (let i = 0; i < 4; i++) {
                code += chars[Math.floor(Math.random() * chars.length)];
            }
            currentCaptcha = code;
            document.getElementById("captchaCode").innerText = code;
        }

        // 查询功能
        function queryPrize() {
            const name = document.getElementById("userName").value.trim();
            const inputCaptcha = document.getElementById("captchaInput").value.trim().toUpperCase();
            const resultBox = document.getElementById("resultBox");
            const resultTitle = document.getElementById("resultTitle");
            const resultContent = document.getElementById("resultContent");

            // 校验
            if (!name) {
                alert("请输入姓名！");
                return;
            }
            if (!inputCaptcha) {
                alert("请输入验证码！");
                return;
            }
            if (inputCaptcha !== currentCaptcha) {
                alert("验证码错误！");
                refreshCaptcha();
                return;
            }

            // 查找获奖信息
            let prizeResult = "未获奖";
            for (let prize in prizeData) {
                if (prizeData[prize].includes(name)) {
                    prizeResult = prize;
                    break;
                }
            }

            // 显示结果
            resultBox.style.display = "block";
            if (prizeResult !== "未获奖") {
                resultTitle.innerText = "🎉 恭喜你获奖！";
                resultContent.innerText = `姓名：${name}\n奖项：${prizeResult}`;
                resultContent.style.color = "#2c3e50";
            } else {
                resultTitle.innerText = "查询结果";
                resultContent.innerText = `姓名：${name}\n未查询到获奖信息`;
                resultContent.style.color = "#95a5a6";
            }
        }
    </script>
</body>
</html>
